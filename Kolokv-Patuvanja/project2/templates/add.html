{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'bootstrap.css' %}">
</head>
<body>

<!--NAVBAR-->
<div class="container-fluid mb-5">
    <div class="row">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <button class="btn btn-light" style="border: 1px solid black" href="#">DNIChk TRAVEL</button>
                <div class="collapse navbar-collapse d-flex justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item me-5"> <!--margin-end-->
                            <a class="nav-link fw-bold" href="{% url 'index' %}">Home</a>
                        </li>
                        <li class="nav-item me-5">
                            <a class="nav-link" href="#">Service</a>
                        </li>
                        <li class="nav-item me-5">
                            <a class="nav-link" href="#">Destination</a>
                        </li>
                        <li class="nav-item me-5">
                            <a class="nav-link" href="#">Testimonial</a>
                        </li>
                        <li class="nav-item me-5">
                            <a class="nav-link" href="#">Login</a>
                        </li>
                        <li class="nav-item me-5">
                            <button class="btn btn-light" style="border: 1px solid black" href="#">Sign Up</button>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                               aria-expanded="false">
                                EN
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">EN</a></li>
                                <li><a class="dropdown-item" href="#">MK</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</div>

<!--FORM-->
<div class="container-fluid">
    <div class="row d-flex justify-content-start">
        <div class="col-4 ms-5 p-5" style="border: 1px solid purple">
            <h4 class="text-center ms-5 pt-5 pb-5">Add new destination</h4>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-danger ps-4 pe-4 mt-4" type="submit">Add</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
